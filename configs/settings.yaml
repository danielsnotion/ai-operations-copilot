app:
  name: ai-operations-copilot
  environment: dev

llm:
  provider: openai
  model: gpt-4.1-mini
  temperature: 0.2

embedding:
  model: all-MiniLM-L6-v2

retrieval:
  top_k: 3

vector_store:
  type: faiss
  metric: l2

logging:
  level: INFO
  file: logs/app.log
  max_bytes: 5242880   # 5MB
  backup_count: 3